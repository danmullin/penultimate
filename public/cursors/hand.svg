<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Open hand: palm + fingers as solid shapes -->
  <g fill="#111" stroke="#fff" stroke-width="1.35" stroke-linejoin="round">
    <!-- fingers -->
    <rect x="9.2" y="4.5" width="3.4" height="11" rx="1.7"/>
    <rect x="13.1" y="2.8" width="3.4" height="12.5" rx="1.7"/>
    <rect x="17" y="3.8" width="3.4" height="11.5" rx="1.7"/>
    <rect x="20.9" y="6.2" width="3.4" height="10" rx="1.7"/>
    <!-- palm / thumb base -->
    <path d="M9.2 14.5h15.1v5.8c0 3.2-2.4 5.7-5.7 5.7h-3.7c-3.3 0-5.7-2.5-5.7-5.7v-5.8z"/>
    <!-- thumb -->
    <rect x="6.2" y="13.2" width="5.2" height="3.4" rx="1.7" transform="rotate(-28 8.8 14.9)"/>
  </g>
</svg>
